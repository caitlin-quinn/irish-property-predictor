# ── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: property-predictor

---
# ── ConfigMap ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: ppr-config
  namespace: property-predictor
data:
  PORT: "5000"
  FLASK_ENV: "production"
  PYTHONPATH: "/app"

---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: property-predictor
  namespace: property-predictor
  labels:
    app: property-predictor
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: property-predictor
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # zero-downtime deploys
  template:
    metadata:
      labels:
        app: property-predictor
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: api
          image: ghcr.io/caitlin-quinn/irish-property-predictor:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: ppr-config
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: model-storage
              mountPath: /app/models
              readOnly: true
      volumes:
        - name: model-storage
          emptyDir: {}           # Replace with PVC in production

---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: property-predictor-svc
  namespace: property-predictor
spec:
  selector:
    app: property-predictor
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer        # Use NodePort for Kind clusters

---
# ── Horizontal Pod Autoscaler ─────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: property-predictor-hpa
  namespace: property-predictor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: property-predictor
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
