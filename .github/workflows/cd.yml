# ── Continuous Delivery ───────────────────────────────────────────────────────
# Triggered on: push to main
# Stages: build Docker image → push to GHCR → deploy to Kind K8s cluster
# ─────────────────────────────────────────────────────────────────────────────

name: CD – Continuous Delivery

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/irish-property-predictor
  K8S_NAMESPACE: property-predictor

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Create models directory
        run: mkdir -p models

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kind K8s Cluster
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Create Kind cluster
        run: |
          cat <<EOF > kind-config.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
              extraPortMappings:
                - containerPort: 30000
                  hostPort: 5000
                  protocol: TCP
          EOF
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.22.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind create cluster --name property-predictor-cluster --config kind-config.yaml
          kubectl cluster-info

      - name: Pull and load Docker image into Kind
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          kind load docker-image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --name property-predictor-cluster

      - name: Apply Kubernetes manifests
        run: |
          sed -i "s|ghcr.io/caitlin-quinn/irish-property-predictor:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest|g" kubernetes/deployment.yaml
          sed -i "s|type: LoadBalancer|type: NodePort|g" kubernetes/deployment.yaml
          sed -i "s|imagePullPolicy: Always|imagePullPolicy: Never|g" kubernetes/deployment.yaml
          sed -i "s|replicas: 2|replicas: 1|g" kubernetes/deployment.yaml
          kubectl apply -f kubernetes/deployment.yaml
          echo "--- Applied manifest ---"
          kubectl get all --namespace=${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/property-predictor \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --timeout=300s || \
          (kubectl describe pods --namespace=${{ env.K8S_NAMESPACE }} && \
           kubectl logs -l app=property-predictor --namespace=${{ env.K8S_NAMESPACE }} && \
           exit 1)

      - name: Smoke test
        run: |
          kubectl wait --for=condition=ready pod \
            -l app=property-predictor \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --timeout=120s
          kubectl port-forward svc/property-predictor-svc 8080:80 \
            --namespace=${{ env.K8S_NAMESPACE }} &
          sleep 5
          curl --fail --retry 5 --retry-delay 3 http://localhost:8080/health
          echo "✅ Smoke test passed"
