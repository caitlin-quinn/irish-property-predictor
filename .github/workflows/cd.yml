# ── Continuous Delivery ───────────────────────────────────────────────────────
# Triggered on: push to main
# Stages: build Docker image → push to GHCR → deploy to Kind K8s cluster
# ─────────────────────────────────────────────────────────────────────────────

name: CD – Continuous Delivery

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/irish-property-predictor
  K8S_NAMESPACE: property-predictor

jobs:
  # ── Job 1: Build & Push Docker Image ─────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Create models directory
        run: mkdir -p models

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy to Kind Kubernetes ─────────────────────────────────────────
  deploy:
    name: Deploy to Kind K8s Cluster
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Create Kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: property-predictor-cluster
          config: |
            kind: Cluster
            apiVersion: kind.x-k8s.io/v1alpha4
            nodes:
              - role: control-plane
                extraPortMappings:
                  - containerPort: 30000
                    hostPort: 5000
                    protocol: TCP

      - name: Pull and load Docker image into Kind
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          kind load docker-image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --name property-predictor-cluster

      - name: Prepare and apply Kubernetes manifests
        run: |
          sed -i "s|ghcr.io/caitlin-quinn/irish-property-predictor:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest|g" \
            kubernetes/deployment.yaml
          sed -i "s|type: LoadBalancer|type: NodePort|g" \
            kubernetes/deployment.yaml
          kubectl apply -f kubernetes/deployment.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/property-predictor \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --timeout=180s

      - name: Run smoke tests
        run: |
          echo "Waiting for pod to be ready..."
          kubectl wait --for=condition=ready pod \
            -l app=property-predictor \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --timeout=120s

          echo "Testing health endpoint..."
          kubectl port-forward \
            svc/property-predictor-svc 8080:80 \
            --namespace=${{ env.K8S_NAMESPACE }} &
          sleep 5
          curl --fail --retry 5 --retry-delay 3 http://localhost:8080/health
          echo "✅ Smoke test passed"

      - name: Print deployment summary
        if: success()
        run: |
          echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          kubectl get pods --namespace=${{ env.K8S_NAMESPACE }}
